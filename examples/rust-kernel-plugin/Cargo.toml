# Standalone example crate: its own `[workspace]` table makes it an independent
# workspace root, so it is NOT pulled into the parent workspace
# (`/Cargo.toml` uses an explicit `members = [...]` list) and cannot disturb the
# main `cargo build`. Build/test it on its own with `--manifest-path`.
[workspace]

[package]
name = "rxgraph-kernel-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Example: a native Rust traversal kernel registered into rxgraph by name"

[lib]
# Default build is a plain library (rlib): it defines and registers a kernel and
# is trivially compilable. The optional `python` feature adds a `cdylib` so the
# same crate can be built into a Python extension with maturin (see README).
crate-type = ["rlib", "cdylib"]

[features]
default = []
# Enables the PyO3 wiring that turns this crate into a Python extension module.
# OFF by default to avoid PyO3 host-link requirements when you only want to
# compile/test the kernel itself.
python = ["dep:pyo3"]

[dependencies]
rxgraph = { path = "../../crates/rxgraph" }
anyhow = "1"
serde_json = "1"
pyo3 = { version = "0.28", features = ["extension-module"], optional = true }

[dev-dependencies]
# Only needed by the tests, to build small graphs with the `record_batch!` macro
# (which also expands to reference `arrow_schema`).
arrow = "58"
arrow-schema = "58"
